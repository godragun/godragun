<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .canvas {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          background: #0d1117;
          border: 1px solid #30363d;
          border-radius: 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          height: 198px;
          color: white;
          overflow: hidden;
        }

        .wizard-container {
          font-size: 70px;
          animation: levitate 3s ease-in-out infinite;
          margin-right: 30px;
          filter: drop-shadow(0 0 10px #E91E63);
        }

        .engineering-dept {
          position: relative;
          width: 100px;
          height: 100px;
          margin-right: 30px;
        }

        .gear-large {
          font-size: 60px;
          position: absolute;
          top: 0; left: 0;
          animation: rotate-clock 4s linear infinite;
        }

        .gear-small {
          font-size: 35px;
          position: absolute;
          bottom: 10px; right: 5px;
          animation: rotate-anti 2s linear infinite;
        }

        .title-text {
          border-left: 2px solid #E91E63;
          padding-left: 20px;
        }

        .name {
          font-size: 28px;
          font-weight: 800;
          background: linear-gradient(90deg, #E91E63, #9C27B0);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }

        @keyframes levitate {
          0%, 100% { transform: translateY(0) rotate(-5deg); }
          50% { transform: translateY(-20px) rotate(5deg); }
        }

        @keyframes rotate-clock {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }

        @keyframes rotate-anti {
          from { transform: rotate(360deg); }
          to { transform: rotate(0deg); }
        }
      </style>

      <div class="canvas">
        <div class="wizard-container">🧙‍♂️</div>
        <div class="engineering-dept">
          <div class="gear-large">⚙️</div>
          <div class="gear-small">⚙️</div>
        </div>
        <div class="title-text">
          <div class="name">GODRAGUN</div>
          <div style="color: #8b949e; letter-spacing: 2px;">WIZARD-ENGINEER</div>
          <div style="font-size: 12px; margin-top: 5px; color: #58a6ff;">&lt; Undergraduate / Sri Lanka &gt;</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
